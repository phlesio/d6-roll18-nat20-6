<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love RPG Anniversary Game</title>

<style>
body {
    margin: 0;
    font-family: "Courier New", Courier, monospace;
    background: #0e0f14;
    color: white;
    text-align: center;
}

.screen { display: none; padding: 20px; }
.active { display: block; }

.card {
    background: #1b1d2a;
    margin: 12px auto;
    padding: 14px;
    border-radius: 12px;
    width: 92%;
    max-width: 520px;
}

button {
    width: 90%;
    max-width: 320px;
    padding: 12px;
    margin: 6px;
    border: none;
    border-radius: 10px;
    background: #ff4d6d;
    color: white;
    font-size: 16px;
}

pre {
    white-space: pre-wrap;
    font-size: 14px;
}

.bar {
    background: #333;
    height: 18px;
    border-radius: 10px;
    overflow: hidden;
}

.fill {
    height: 100%;
    background: #ff4d6d;
    transition: 0.3s;
}

.enemyFill { background: #6c63ff; }

.ascii {
    font-family: monospace;
    white-space: pre;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro" class="screen active">
    <h1>Test your Love</h1>
    <div class="card">
        <p>A relationship RPG adventure</p>
    </div>
    <button onclick="start()">Accept Quest</button>
</div>

<!-- CHARACTER -->
<div id="char" class="screen">
    <h2>Create Character</h2>
    <input id="name" placeholder="Your name">
    <br>
    <select id="class">
        <option>Bubbas Bard</option>
        <option>Wizard of Nooms</option>
        <option>Darling Druid</option>
        <option>Bubsbarian</option>
    </select>

    <button onclick="create()">Roll for Stats</button>

    <div id="stats"></div>

    <button onclick="level1()">Begin Journey</button>
</div>

<!-- BATTLE -->
<div id="battle" class="screen">

    <div class="card">
        <h3>PLAYER</h3>
        <div class="bar"><div id="pbar" class="fill"></div></div>
        <p id="php"></p>
    </div>

    <div class="card">
        <h3 id="enemyName"></h3>
        <pre id="enemyArt" class="ascii"></pre>

        <div class="bar"><div id="ebar" class="fill enemyFill"></div></div>
        <p id="ehp"></p>

        <p id="enemyStats"></p>
    </div>

    <div class="card">
        <pre id="log"></pre>
        <pre id="effect"></pre>
    </div>

    <button onclick="attack()">ATTACK</button>

    <!-- CAT SYSTEM -->
    <div class="card" id="catCard" style="display:none;">
        <h3>🐱 COMPANION ENCOUNTER</h3>
        <pre id="catArt" class="ascii"></pre>
        <p id="catName"></p>
        <button onclick="tameCat()">Try to Tame (Roll d20)</button>
        <p id="catResult"></p>
    </div>

</div>

<!-- END -->
<div id="end" class="screen">
    <h1>THE END</h1>
    <p>Happy One Year Anniversary ❤️</p>
</div>

<script>

/* =========================
   STATE
========================= */

let game = {
    player: { hp: 100, maxHp: 100, name: "", class: "", cat: null },
    enemy: { hp: 0, maxHp: 0, name: "", stats: {} },
    next: null,
    cat: null
};

/* =========================
   BOSSES
========================= */

const bosses = {
    miscommunication: {
        name: "Miscommunication",
        hp: 40,
        ascii: `??? signals break ???`,
    },
    doubt: {
        name: "Doubt",
        hp: 60,
        ascii: `( ? ? )`,
    },
    distance: {
        name: "Distance",
        hp: 80,
        ascii: `YOU .... PHILLIPS`,
    },
    final: {
        name: "Corrupted Phillips",
        hp: 120,
        ascii: `(╬ಠ益ಠ)`,
    }
};

/* =========================
   CATS
========================= */

const cats = [
    { name: "Void Kitten", ascii: "(=චᆽච=)", buff: "damage" },
    { name: "Sunbeam Cat", ascii: "ฅ^•ﻌ•^ฅ", buff: "heal" },
    { name: "Gremlin Cat", ascii: "(=｀ω´=)", buff: "crit" }
];

/* =========================
   NAV
========================= */

function show(id){
    document.querySelectorAll(".screen")
        .forEach(s => s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

function start(){ show("char"); }

/* =========================
   DICE
========================= */

function roll(){
    return Math.floor(Math.random()*20)+1;
}

function nat20(r){ return r === 20; }

/* =========================
   CHARACTER
========================= */

function create(){
    game.player.name = document.getElementById("name").value;
    game.player.class = document.getElementById("class").value;

    let s = "";
    for(let i=0;i<6;i++){
        s += Math.floor(Math.random()*20)+1 + " ";
    }

    document.getElementById("stats").innerHTML =
        `<div class="card">${s}</div>`;
}

/* =========================
   CAT SYSTEM
========================= */

function spawnCat(){

    let c = cats[Math.floor(Math.random()*cats.length)];

    game.cat = { ...c, tamed: false };

    document.getElementById("catCard").style.display = "block";
    document.getElementById("catArt").innerText = c.ascii;
    document.getElementById("catName").innerText = c.name;
    document.getElementById("catResult").innerText = "";
}

function tameCat(){

    let r = roll();

    if(r > 10){
        game.cat.tamed = true;
        game.player.cat = game.cat;

        document.getElementById("catResult").innerText =
            `Rolled ${r} — The cat trusts you ❤️`;
    } else {
        document.getElementById("catResult").innerText =
            `Rolled ${r} — The cat ran away...`;
    }

    document.getElementById("catCard").style.display = "none";
}

/* =========================
   SPAWN
========================= */

function spawn(key, next){

    let b = bosses[key];

    game.enemy.name = b.name;
    game.enemy.hp = b.hp;
    game.enemy.maxHp = b.hp;
    game.next = next;

    document.getElementById("enemyName").innerText = b.name;
    document.getElementById("enemyArt").innerText = b.ascii;

    update();
    show("battle");

    spawnCat(); // 👈 CAT ADDED HERE
}

/* =========================
   COMBAT
========================= */

function attack(){

    let pr = roll();
    let er = roll();

    // CAT BUFFS
    if(game.player.cat && game.player.cat.tamed){
        if(game.player.cat.buff === "damage") pr += 2;
        if(game.player.cat.buff === "crit" && pr > 18) pr = 20;
    }

    document.getElementById("log").innerText =
        `You rolled ${pr} vs Enemy ${er}`;

    if(nat20(pr)){
        game.enemy.hp -= 30;
        document.getElementById("effect").innerText = "CRITICAL HIT 💥";
    }
    else if(pr >= er){
        game.enemy.hp -= 10;
    }
    else {
        game.player.hp -= 10;
    }

    update();
    endCheck();
}

/* =========================
   UI
========================= */

function update(){

    document.getElementById("php").innerText =
        game.player.hp + " / 100";

    document.getElementById("ehp").innerText =
        game.enemy.hp + " / " + game.enemy.maxHp;

    document.getElementById("pbar").style.width =
        game.player.hp + "%";

    document.getElementById("ebar").style.width =
        (game.enemy.hp / game.enemy.maxHp * 100) + "%";
}

/* =========================
   END
========================= */

function endCheck(){

    if(game.enemy.hp <= 0){
        setTimeout(()=>game.next(), 700);
    }

    if(game.player.hp <= 0){
        document.body.innerHTML =
        "<h1 style='color:white;text-align:center;padding:50px;'>💔 You Lost</h1>";
    }
}

/* =========================
   LEVELS
========================= */

function level1(){ spawn("miscommunication", level2); }
function level2(){ spawn("doubt", level3); }
function level3(){ spawn("distance", finalBoss); }

function finalBoss(){ spawn("final", endGame); }

function endGame(){ show("end"); }

</script>

</body>
</html>
