<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roll For Love ❤️</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0e0f14;
    color: white;
    text-align: center;
}

.screen { display: none; padding: 20px; }
.active { display: block; }

.card {
    background: #1b1d2a;
    margin: 15px auto;
    padding: 15px;
    border-radius: 12px;
    width: 90%;
    max-width: 500px;
}

button {
    background: #ff4d6d;
    border: none;
    padding: 12px;
    margin: 6px;
    border-radius: 10px;
    color: white;
    font-size: 16px;
    width: 90%;
    max-width: 300px;
}

input, select {
    padding: 10px;
    margin: 8px;
    width: 80%;
    max-width: 300px;
}

pre {
    white-space: pre-wrap;
    font-size: 14px;
}

.bar {
    background: #333;
    height: 18px;
    border-radius: 10px;
    overflow: hidden;
}

.fill {
    height: 100%;
    background: #ff4d6d;
}

.enemyFill {
    background: #6c63ff;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro" class="screen active">
    <h1>🎲 Roll For Love</h1>

    <div class="card">
        <p>A quest appears...</p>
        <h2>Find Your Forever Person</h2>
    </div>

    <button onclick="startGame()">Accept Quest</button>
</div>

<!-- CHARACTER -->
<div id="create" class="screen">
    <h2>Create Character</h2>

    <input id="name" placeholder="Your name">
    <br>

    <select id="class">
        <option>Bard</option>
        <option>Fighter</option>
        <option>Rogue</option>
        <option>Wizard</option>
        <option>Ranger</option>
    </select>

    <br>

    <button onclick="createChar()">Roll Stats</button>

    <div id="stats"></div>

    <button onclick="level1()">Start Adventure</button>
</div>

<!-- BATTLE -->
<div id="battle" class="screen">

    <div class="card">
        <h3>YOU</h3>
        <div class="bar"><div id="pbar" class="fill"></div></div>
        <p id="php"></p>
    </div>

    <div class="card">
        <h3 id="enemyName"></h3>
        <pre id="enemyArt"></pre>

        <div class="bar"><div id="ebar" class="fill enemyFill"></div></div>
        <p id="ehp"></p>

        <p id="enemyStats"></p>
    </div>

    <div class="card">
        <pre id="log"></pre>
        <pre id="effect"></pre>
    </div>

    <button onclick="attack()">ATTACK</button>
</div>

<!-- END -->
<div id="end" class="screen">
    <h1>❤️ THE END</h1>
    <div id="ending"></div>
</div>

<script>

/* =========================
   GAME STATE
========================= */

let game = {
    player: { hp: 100, maxHp: 100, name: "", class: "", cat: null },
    enemy: { hp: 0, maxHp: 0, name: "", stats: {} }
};

const ascii = {
    miscommunication: `
   ??? MISCOMMUNICATION ???
    `,
    doubt: `
      .-.
     ( ? )
      '-'
      DOUBT
    `,
    distance: `
PLAYER        ...        PHILLIPS
      (distance grows)
    `,
    phillips: `
   (╬ಠ益ಠ)
   CORRUPTED PHILLIPS
    `,
    cat: `
 /\\_/\\
( o.o )
 > ^ <
    `
};

/* =========================
   NAV
========================= */

function show(id){
    document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

function startGame(){ show("create"); }

/* =========================
   CHAR CREATION
========================= */

function createChar(){
    game.player.name = document.getElementById("name").value;
    game.player.class = document.getElementById("class").value;

    let stats = "";
    for(let i=0;i<6;i++){
        stats += Math.floor(Math.random()*20)+1 + " ";
    }

    document.getElementById("stats").innerHTML =
        `<div class="card">Stats: ${stats}</div>`;
}

/* =========================
   DICE
========================= */

function roll(){
    return Math.floor(Math.random()*20)+1;
}

/* =========================
   ENEMY
========================= */

function spawn(name, hp, art){
    game.enemy.name = name;
    game.enemy.hp = hp;
    game.enemy.maxHp = hp;

    document.getElementById("enemyName").innerText = name;
    document.getElementById("enemyArt").innerText = art;

    updateUI();
    show("battle");
}

/* =========================
   BATTLE
========================= */

function attack(){

    let pr = roll();
    let er = roll();

    let log = `You: ${pr} vs Enemy: ${er}`;

    if(pr === 20){
        game.enemy.hp -= 30;
        document.getElementById("effect").innerText =
        "💥 NAT 20! LOVE BREAKS THROUGH!";
    }

    else if(pr >= er){
        game.enemy.hp -= 10;
        log += " | Hit!";
    }

    else {
        game.player.hp -= 10;
        log += " | You got hit!";
    }

    document.getElementById("log").innerText = log;

    updateUI();
    checkEnd();
}

/* =========================
   UI
========================= */

function updateUI(){

    document.getElementById("php").innerText =
        game.player.hp + " / 100";

    document.getElementById("ehp").innerText =
        game.enemy.hp + " / " + game.enemy.maxHp;

    document.getElementById("pbar").style.width =
        game.player.hp + "%";

    document.getElementById("ebar").style.width =
        (game.enemy.hp / game.enemy.maxHp * 100) + "%";
}

/* =========================
   ENDING
========================= */

function checkEnd(){

    if(game.enemy.hp <= 0){
        show("end");
        document.getElementById("ending").innerHTML =
        "<p>You chose each other.</p><p>❤️ Happy Anniversary ❤️</p>";
    }

    if(game.player.hp <= 0){
        document.body.innerHTML =
        "<h1 style='color:white;text-align:center;padding:50px;'>💔 You Lost</h1>";
    }
}

/* =========================
   LEVEL STARTERS
========================= */

function level1(){ spawn("Miscommunication", 40, ascii.miscommunication); }
function level2(){ spawn("Doubt", 60, ascii.doubt); }
function level3(){ spawn("Distance", 80, ascii.distance); }
function finalBoss(){ spawn("Corrupted Phillips", 120, ascii.phillips); }

</script>

</body>
</html>
